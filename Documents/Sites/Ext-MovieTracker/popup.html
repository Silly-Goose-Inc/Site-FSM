<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial; width: 320px; padding: 10px; }
    textarea { width: 100%; height: 80px; }
    .hidden { display: none; }
    .row { margin-bottom: 8px; }
  </style>
</head>
<body>
  <h3>Watch Tracker</h3>

  <div class="row">
    <input id="title" placeholder="Title" style="width:100%">
  </div>

  <button id="grabTitle">Grab Title from Page</button>


  <div class="row">
    <label>Type:</label>
    <select id="type">
      <option value="movie">Movie</option>
      <option value="show">Show</option>
    </select>
  </div>

  <div id="showFields" class="hidden">
    <div class="row">
      <input id="season" placeholder="S01">
      <input id="episode" placeholder="E01">
    </div>
  </div>

  <div class="row">
    <label>Rating (0–10):</label>
    <input id="rating" type="number" min="0" max="10" value="0">
  </div>

  <div class="row">
    <textarea id="notes" placeholder="Your notes..."></textarea>
  </div>

  <div class="row">
    <input id="tags" placeholder="tags (comma separated)" style="width:100%">
  </div>

  <button id="markWatched">Mark Watched</button>
  <button id="saveNotes">Save Notes</button>
  <button id="view">View Library</button>

  <pre id="output"></pre>

  <script src="popup.js"></script>
</body>
</html>
